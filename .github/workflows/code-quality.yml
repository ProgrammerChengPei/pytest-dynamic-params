name: Code Quality

on: [push, pull_request]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run Black
      run: black --check .
    - name: Run isort
      run: isort --check-only .
    - name: Run Flake8
      run: flake8 .
    - name: Run mypy
      run: mypy src/
    - name: Run Bandit
      run: bandit -r src/